name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 8 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ping Supabase - Varzola
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}")
          echo "Status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "Varzola Supabase esta ativo (status $STATUS)."
          else
            echo "::error::Falha ao pingar o Supabase. Status: $STATUS"
            exit 1
          fi

      - name: Heartbeat anti-desativacao (commit vazio se repo perto de 60d parado)
        if: always()
        run: |
          LAST=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          DAYS=$(( (NOW - LAST) / 86400 ))
          echo "Dias desde o ultimo commit: $DAYS"
          if [ "$DAYS" -ge 50 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: keep-alive heartbeat [skip ci]"
            git push
            echo "Heartbeat: commit vazio enviado (repo estava $DAYS dias parado)."
          else
            echo "Heartbeat: sem necessidade (repo ativo ha $DAYS dias)."
          fi
