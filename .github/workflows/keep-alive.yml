name: Supabase Keep Alive

# O Supabase pausa projeto free-tier que nao recebe "sufficient user database
# activity" em 7 dias, e a doc quantifica isso como "a few user requests to the
# database each day". Um ping a cada 3 dias (o cron anterior) fica bem abaixo
# disso: o Ohana levou aviso de pausa em 13/07/2026 mesmo com os pings dando 200.
# Dai 4 execucoes por dia x 2 queries = ~8 requests/dia, com folga.
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ping Supabase - Varzola
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          TABLES: 'peladas rounds'
        run: |
          set +e

          sanitize() {
            local v="$1"
            v="${v//$'\r'/}"
            v="${v//$'\n'/}"
            v="${v## }"
            v="${v%% }"
            v="${v#\"}"
            v="${v%\"}"
            v="${v#\'}"
            v="${v%\'}"
            printf '%s' "$v"
          }

          URL=$(sanitize "$SUPABASE_URL")
          URL="${URL%/}"
          KEY=$(sanitize "$SUPABASE_KEY")

          if [ -z "$URL" ]; then
            echo "::error::Secret SUPABASE_URL vazio."
            exit 1
          fi
          if [ -z "$KEY" ]; then
            echo "::error::Secret SUPABASE_PUBLISHABLE_KEY vazio."
            exit 1
          fi
          if [[ "$URL" != http* ]]; then
            URL="https://$URL"
          fi

          echo "Tamanho da KEY após sanitizar: ${#KEY} chars"

          FALHAS=0
          for TABELA in $TABLES; do
            # Query numa tabela real: so um 2xx prova que a requisicao chegou ao
            # Postgres. O gateway responde 401/403 sem tocar no banco, e isso nao
            # conta como atividade — foi o que pausou o Varzola em 14/07/2026.
            STATUS=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
              --max-time 15 \
              "$URL/rest/v1/$TABELA?select=id&limit=1" \
              -H "apikey: $KEY" \
              -H "Authorization: Bearer $KEY")
            CURL_EXIT=$?

            if [ "$CURL_EXIT" -ne 0 ]; then
              echo "::error::[$TABELA] curl falhou (exit $CURL_EXIT). Exit 6 = host não resolve = projeto pausado; despausar no dashboard."
              FALHAS=$((FALHAS + 1))
              continue
            fi

            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ] 2>/dev/null; then
              echo "[$TABELA] OK (query real chegou ao Postgres, status $STATUS)."
              continue
            fi

            echo "::error::[$TABELA] falhou com status $STATUS. Corpo:"
            head -5 /tmp/body.txt
            if [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
              echo "::error::Secret SUPABASE_PUBLISHABLE_KEY inválido ou expirado. Regravar em Settings > Secrets com a publishable key (sb_publishable_...), não com a anon legacy."
            fi
            FALHAS=$((FALHAS + 1))
          done

          if [ "$FALHAS" -gt 0 ]; then
            echo "::error::$FALHAS query(s) falharam — o projeto NÃO recebeu atividade."
            exit 1
          fi
          echo "Varzola Supabase ativo."

      - name: Heartbeat anti-desativacao (commit vazio se repo perto de 60d parado)
        if: always()
        run: |
          LAST=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          DAYS=$(( (NOW - LAST) / 86400 ))
          echo "Dias desde o último commit: $DAYS"
          if [ "$DAYS" -ge 50 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: keep-alive heartbeat [skip ci]"
            git push
            echo "Heartbeat: commit vazio enviado (repo estava $DAYS dias parado)."
          else
            echo "Heartbeat: sem necessidade (repo ativo há $DAYS dias)."
          fi
